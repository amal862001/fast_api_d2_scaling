services:

  db:
    image: postgres:15
    container_name: nyc311v2_db
    env_file: .env
    environment:
      POSTGRES_DB       : nyc_311
      POSTGRES_USER     : postgres
      POSTGRES_PASSWORD : password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test     : ["CMD-SHELL", "pg_isready -U postgres"]
      interval : 5s
      timeout  : 5s
      retries  : 5

  redis:
    image: redis:7-alpine
    container_name: nyc311v2_redis
    ports:
      - "6379:6379"
    healthcheck:
      test     : ["CMD", "redis-cli", "ping"]
      interval : 5s
      timeout  : 5s
      retries  : 5

  app:
    build: .
    container_name: nyc311v2_app
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test        : ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')\" && echo ok"]
      interval    : 15s
      timeout     : 10s
      retries     : 5
      start_period: 40s

  arq_worker:
    build: .
    container_name: nyc311v2_worker
    command: ["python", "-m", "arq", "tasks.settings.WorkerSettings"]
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test     : ["CMD", "python", "-c", "import arq; print('ok')"]
      interval : 10s
      timeout  : 5s
      retries  : 3
    restart: on-failure

  prometheus:
    image: prom/prometheus:latest
    container_name: nyc311v2_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test     : ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval : 10s
      timeout  : 5s
      retries  : 3
    restart: on-failure

  grafana:
    image: grafana/grafana:latest
    container_name: nyc311v2_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test     : ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval : 10s
      timeout  : 5s
      retries  : 5
    restart: on-failure

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
