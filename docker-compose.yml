version: "3.9"

services:

  # PostgreSQL
  db:
    image: postgres:15
    container_name: nyc311_db
    environment:
      POSTGRES_USER     : postgres
      POSTGRES_PASSWORD : password
      POSTGRES_DB       : nyc_311
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test     : ["CMD-SHELL", "pg_isready -U postgres"]
      interval : 5s
      timeout  : 5s
      retries  : 5

  # FastAPI App
  app:
    build: .
    container_name: nyc311_app
    ports:
      - "8000:8000"
    volumes:
      - ./nyc_311_requests.csv:/app/nyc_311_requests.csv
      - ./uploads:/app/uploads
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data: